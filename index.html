                <p>Furthermore, for all integer \\(p\\geq 0\\) and for any integer \\(n\\geq 1\\), the trajectory starting with \\(n\\) is bounded and eventually reaches <strong> \\(2^p\\)</strong> if \\(p\\notin \\{1,3,4,7\\}  \\) and it reaches <strong> \\(2^p\\) or \\(\\omega_{p,0}\\)</strong> if \\(p\\in \\{1,3,4,7\\}  \\). The number \\(\\omega_{p,0}\\) is given in the prvious Table.  </p>
<p>The classical Collatz conjecture is obtained for \\(p=0\\). </p>
<p>If \\(p=2^k\\) is a power of \\(2\\) then \\(d=2^{2^k}+1\\) is a <strong>Fermat number</number>. </p>

            </div>




        `,
        vulga: `
            <h3>💡 The Rule of 10 (Popularization)</h3>
 <p>Choosing <strong>p=3</strong>  and <strong>q=1</strong>, we get  \\( d=10 \\) ,  \\( \\alpha=12 \\) and  \\( \\beta =8 \\). The map becomes:</p>
            $$T_{3,1}(n)=\\begin{cases} 
                \\frac{n}{10} & \\text{if } n \\equiv 0 \\pmod{10} \\\\ 
                \\frac{12n + 8[n]_{10}}{10} & \\text{if } n \\not\\equiv 0 \\pmod{10} 
            \\end{cases}$$
            <p>The theory turns into an easy arithmetic game:</p>
            <ul>
                <li>Take any positive integer to start.</li>
                <li>If it ends with a zero (multiple of 10), <strong>divide it by 10</strong>.</li>
                <li>Otherwise, <strong>multiply it by 12</strong>, add <strong>8 times its last digit</strong>, then divide the result by 10.</li>
                <li>Repeat the process iteratively.</li>
            </ul>
            <p><strong>The Conjecture:</strong> Regardless of the starting number, you will always reach the number <strong>4</strong> after a finite number of iterations.</p>

        `,
