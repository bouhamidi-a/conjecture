<div class="main-conjecture">
                <h4>🏆 Main Conjecture</h4>
                <p>Pour tous les entiers \\(p\\) et \\(q\\) tels que \\(p\\geq q\\geq 0\\), l'application \\(T_{p,q}\\) :</p>
                <ol>
                    <li><strong>Si \\((p,q)\\notin \\mathbb{E}\\) :</strong> possède un et un seul cycle, le cycle trivial \\(\\Omega(2^{p-q})\\) commençant par \\(2^{p-q}\\) et de longueur \\(2^{p-q}+q+1\\).</li>
                    <li><strong>Si \\((p,q)\\in \\mathbb{E}\\) :</strong> possède exactement deux cycles, le cycle trivial \\(\\Omega(2^{p-q})\\) et le cycle secondaire \\(\\Omega(\\omega_{p,q})\\), sauf pour le cas \\((p,q)=(5,2)\\) où elle possède exactement trois cycles : le cycle trivial et deux cycles secondaires \\(\\Omega(76200)\\) et \\(\\Omega(87176)\\).</li>
                </ol>
                <p>De plus, pour tous les entiers \\(p\\) et \\(q\\) tels que \\(p\\geq q\\geq 0\\) et pour tout entier \\(n\\geq 1\\), la trajectoire issue de \\(n\\) est bornée et finit par atteindre un élément de l'ensemble \\(A_{p,q}\\).</p>
            </div>



            <p><em>Note historique :</em> Le cas spécifique où <strong>p = 0</strong> et <strong>q = 0</strong> correspond très exactement à l'application de la célèbre <strong>conjecture de Collatz</strong> (ou problème de Syracuse).</p>
        `,

        theory: `

            $$T_{p,q}(n)=\\begin{cases}

            <p>where \\( d = 2^p+2^{q} \\), \\( \\alpha = 2^p+2^{q+1} \\), \\( \\beta = 2^p \\) and \\( [n]_{d} \\) is the remainder in the Euclidean division of \\( n \\) by \\( d \\).</p>

                <tr><td>\\((6,2)\\)</td><td>\\(1264\\)</td><td>\\(69\\)</td></tr>

            <p>A cycle starting with a minimal element \\(\\omega_{p,q}\\) will be denoted by \\(\\Omega(\\omega_{p,q})\\).</p>

            $$ A_{p,q} = \\begin{cases} 
            \\{2^{p-q}\\} & \\text{if } (p,q)\\notin \\mathbb{E} \\\\

<div class="main-conjecture">
                <h4>🏆 Main Conjecture</h4>
                <p>For all integers \\(p\\) and \\(q\\) such that \\(p\\geq q\\geq 0\\), the mapping \\(T_{p,q}\\):</p>
                <ol>
                    <li><strong>If \\((p,q)\\notin \\mathbb{E}\\):</strong> has only <strong>one</strong> cycle, the trivial one \\(\\Omega(2^{p-q})\\) starting with \\(2^{p-q}\\) and of length \\(2^{p-q}+q+1\\).</li>
